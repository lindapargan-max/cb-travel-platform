<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB Travel — Offline</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e3a5f; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .card { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; max-width: 400px; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 24px; }
    a { background: #e8b84b; color: #1e3a5f; text-decoration: none; padding: 12px 28px; border-radius: 12px; font-weight: bold; display: inline-block; }
    a:hover { background: #d4a43a; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size: 4rem; margin-bottom: 16px;">✈️</div>
    <h1>You're Offline</h1>
    <p>It looks like you don't have an internet connection right now. Please reconnect to access your CB Travel portal.</p>
    <a href="/dashboard">Try Again</a>
  </div>
</body>
</html>
